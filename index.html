<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Managemennt Login</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="login.js"></script>
    </head>
<body>

    <div class="login-box">
        <label for="e-mail">Email <span class="text-danger">*</span>:</label>
        <input type="email" id="e-mail" class="form-control" onchange="login()">
        <span id="emailError" class="text-danger"></span><br>

        <label for="password">Password <span class="text-danger">*</span>:</label>
        <input type="text" id="password" class="form-control" onchange="login()">
        <span id="passwordError" class="text-danger"></span>

        
        <button class="btn btn-primary w-100 mt-3">Login</button>
<span id="loginError" class="text-danger"></span>
    </div>

</body>
</html>
