<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style1.css">

</head>

<body>
    <nav class="navbar navbar-dark bg-primary">
    <div class="container-fluid">
        <span class="navbar-brand">
            Student Management System
        </span>

        <button class="btn btn-light" onclick="logout()">
            Logout
        </button>
    </div>
</nav>

    <div class="container mt-5">

        <h2 class="text-center mb-4">Student Management System</h2>

        <div class="card p-4">
            <form id="studentForm">


                <div class="row">

                    <div class="col-md-4 mb-3">
                        <label>Student ID <span class="text-danger">*</span>:</label>
                        <input type="text" id="studentId" class="form-control">
                        <span id="studentIdError" class="text-danger"></span>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label>Student Name <span class="text-danger">*</span>:</label>
                        <input type="text" id="studentName" class="form-control">
                        <span id="studentNameError" class="text-danger"></span>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label>Date of Birth <span class="text-danger">*</span>:</label>
                        <input type="date" id="dob" class="form-control">
                        <span id="dobError" class="text-danger"></span>
                    </div>

                </div>

                <div class="row">

                    <div class="col-md-4 mb-3">
                        <label for="gender" class="form-label">Gender <span class="text-danger">*</span>:</label>


                        <select class="form-select" id="gender">
                            <option value="">Select Gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                        <span id="genderError" class="text-danger"></span>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label for="course" class="form-label">Courses <span class="text-danger">*</span>:</label>

                        <select id="course" class="form-select">
                            <option value="">Choose Course</option>
                            <option value="java">Java Full Stack</option>
                            <option value="python">Python Full Stack</option>
                            <option value="c">MERN Stack</option>
                            <option value="cpp">Data Science</option>
                        </select>
                        <span id="courseError" class="text-danger"></span>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label>Mobile Number<span class="text-danger">*</span>:</label>
                        <input type="number" id="mobileNumber" class="form-control">
                        <span id="mobileNumberError" class="text-danger"></span>
                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label>Email <span class="text-danger">*</span>:</label>
                        <input type="email" id="email" class="form-control">
                        <span id="emailError" class="text-danger"></span>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Address <span class="text-danger">*</span>:</label>
                        <textarea id="address" class="form-control"></textarea>
                        <span id="addressError" class="text-danger"></span>
                    </div>

                </div>


                <button type="button" class="btn btn-primary" onclick="addStudent()">
                    Add Student
                </button>
            </form>

        </div>

        <div class="mt-4">

            <input type="text" id="search" class="form-control mb-3" placeholder="Search Student"
                onkeyup="searchStudent()">

            <table class="table table-bordered text-center">

                <thead class="table-dark">
                    <tr>
                        <th>Student ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Course</th>
                        <th>Mobile</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody id="studentTableBody">

                </tbody>

            </table>

        </div>

    </div>


    <script src="students.js"></script>
</body>

</html>
